<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High School Study Hall — Qwiklearn</title>
  <style>
    /* ── RESET & BASE ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #ffffff;
      color: #1a2e1a;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: linear-gradient(135deg, #0d2e1a 0%, #1a4a2a 100%);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 16px rgba(0,0,0,0.2);
      border-bottom: 3px solid #c05010;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 72px;
    }

    .nav-logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-logo span {
      color: #f5a623;
    }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 32px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      transition: color 0.2s;
      padding: 6px 0;
    }

    .nav-links li a:hover,
    .nav-links li a.active {
      color: #f5a623;
      border-bottom: 2px solid #f5a623;
    }

    .nav-links li a.nav-cta {
      background: linear-gradient(135deg, #c05010 0%, #f5a623 100%);
      color: #ffffff;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
      border-bottom: none;
    }

    .nav-links li a.nav-cta:hover {
      background: linear-gradient(135deg, #a0400a 0%, #e09515 100%);
      color: #ffffff;
      transform: scale(1.02);
      border-bottom: none;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      width: 28px;
      height: 3px;
      background: #ffffff;
      border-radius: 3px;
      transition: 0.3s;
    }

    /* ── DROPDOWN ── */
    .dropdown {
      position: relative;
    }

    .dropdown .dropbtn {
      cursor: pointer;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #0d2e1a;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 8px 0;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 1001;
    }

    .dropdown-content li {
      list-style: none;
    }

    .dropdown-content li a {
      display: block;
      padding: 10px 20px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
      border-bottom: none !important;
    }

    .dropdown-content li a:hover {
      background: rgba(245,166,35,0.15);
      color: #f5a623;
      border-bottom: none !important;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    @media (max-width: 820px) {
      .hamburger {
        display: flex;
      }

      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 72px;
        left: 0;
        right: 0;
        background: #0d2e1a;
        padding: 24px 24px;
        gap: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        border-bottom: 3px solid #c05010;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links li a {
        font-size: 1rem;
        padding: 8px 0;
      }

      .nav-links li a.nav-cta {
        text-align: center;
        padding: 12px 24px;
      }

      .dropdown
